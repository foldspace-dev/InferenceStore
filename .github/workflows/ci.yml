name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macOS runners ship the Android SDK and Xcode, so a single job builds the
    # full Kotlin Multiplatform matrix: common, JVM, Android, and iOS.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build all targets
        run: ./gradlew build --stacktrace

name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '**/*.kt'
      - 'build.gradle.kts'
      - 'gradle/libs.versions.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege for the build job; the deploy job needs pages + id-token.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # macOS matches the CI build environment, so Dokka analyzes the full KMP
    # (common/JVM/Android/iOS) source sets the same way the library is built.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Generate API reference (Dokka)
        run: ./gradlew dokkaGenerate --stacktrace
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install MkDocs
        run: pip install -r docs/requirements.txt
      - name: Build site (strict)
        run: mkdocs build --strict
      - name: Bundle the API reference under /api
        run: |
          mkdir -p site/api
          cp -R build/dokka/html/. site/api/
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
